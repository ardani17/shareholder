services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: shareholder_mapping
      POSTGRES_USER: shareholder
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shareholder -d shareholder_mapping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATASAHAM_API_KEY: ${DATASAHAM_API_KEY}
      PORT: "3001"
      DATABASE_URL: postgresql://shareholder:${DB_PASSWORD:-changeme}@db:5432/shareholder_mapping

  frontend:
    build:
      context: ./frontend
      args:
        VITE_SITE_PASSWORD: ${VITE_SITE_PASSWORD:-shareholder2026}
        VITE_DASHBOARD_PASSWORD: ${VITE_DASHBOARD_PASSWORD:-admin2026}
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
